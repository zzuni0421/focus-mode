<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타이머</title>

<style>
body{
margin:0;
font-family:Pretendard,sans-serif;
background:linear-gradient(135deg,#ffb6d9,#ffd6ec,#ffeaf5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 메인 카드 */

.container{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:45px;
border-radius:28px;
box-shadow:0 15px 40px rgba(255,120,170,0.25);
text-align:center;
width:420px;
border:1px solid rgba(255,255,255,0.5);
}

/* 제목 입력 */

.titleInput{
width:100%;
padding:10px;
border-radius:12px;
border:none;
background:#fff;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:15px;
font-size:14px;
}

/* 타이머 숫자 */

.timeDisplay{
font-size:64px;
font-weight:700;
margin:25px 0;
color:#ff2d95;
letter-spacing:2px;
}

/* 시간 입력 */

.inputs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
}

.inputs input{
width:65px;
padding:8px;
text-align:center;
border-radius:10px;
border:none;
background:#fff;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
font-weight:600;
}

/* 빠른 버튼 */

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin-bottom:18px;
}

.quick button{
padding:8px 12px;
border:none;
border-radius:12px;
background:#ffe4f2;
color:#ff2d95;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.quick button:hover{
transform:scale(1.05);
background:#ffd1ec;
}

/* 컨트롤 버튼 */

.controls{
display:flex;
gap:12px;
justify-content:center;
}

.controls button{
padding:10px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff5cb8,#ff2d95);
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
box-shadow:0 6px 15px rgba(255,80,150,0.3);
}

.controls button:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 10px 20px rgba(255,80,150,0.4);
}

.controls button:active{
transform:scale(0.95);
}

</style>
</head>

<body>

<div class="container">

<h2>⏳ 타이머</h2>

<input class="titleInput" id="title" placeholder="타이머 제목">

<div class="inputs">
<input id="h" type="number" placeholder="시">
<input id="m" type="number" placeholder="분">
<input id="s" type="number" placeholder="초">
</div>

<div class="quick">

<button onclick="setTime(60)">1분</button>
<button onclick="setTime(120)">2분</button>
<button onclick="setTime(180)">3분</button>
<button onclick="setTime(300)">5분</button>
<button onclick="setTime(600)">10분</button>
<button onclick="setTime(900)">15분</button>
<button onclick="setTime(1200)">20분</button>
<button onclick="setTime(1800)">30분</button>
<button onclick="setTime(3600)">1시간</button>

</div>

<div class="timeDisplay" id="time">00:00:00</div>

<div class="controls">
<button onclick="start()">시작</button>
<button onclick="pause()">일시정지</button>
<button onclick="reset()">리셋</button>
</div>

</div>

<script>

let total=0;
let timer=null;

const display=document.getElementById("time");

function format(t){

let h=Math.floor(t/3600);
let m=Math.floor((t%3600)/60);
let s=t%60;

return String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

function update(){
display.innerText=format(total);
}

function setTime(sec){
total=sec;
update();
}

function readInput(){

const h=parseInt(document.getElementById("h").value)||0;
const m=parseInt(document.getElementById("m").value)||0;
const s=parseInt(document.getElementById("s").value)||0;

total=h*3600+m*60+s;

update();

}

document.getElementById("h").addEventListener("change",readInput);
document.getElementById("m").addEventListener("change",readInput);
document.getElementById("s").addEventListener("change",readInput);

function start(){

if(total<=0) return;

if(timer) return;

timer=setInterval(()=>{

total--;
update();

localStorage.setItem("timer-time",total);

if(total<=0){

playAlarm();
clearInterval(timer);
timer=null;
alert("⏰ 타이머 종료!");

}

},1000);

}

function pause(){
clearInterval(timer);
timer=null;
}

function reset(){
pause();
total=0;
update();
localStorage.removeItem("timer-time");
}

const saved=localStorage.getItem("timer-time");

if(saved){
total=parseInt(saved);
update();
}

function playAlarm(){

const audio = new AudioContext();
const oscillator = audio.createOscillator();
const gain = audio.createGain();

oscillator.connect(gain);
gain.connect(audio.destination);

oscillator.frequency.value = 880;
oscillator.type = "sine";

oscillator.start();

setTimeout(()=>{
oscillator.stop();
},500);

}
</script>

</body>
</html>
