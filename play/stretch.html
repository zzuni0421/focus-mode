<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Stretch</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Pretendard,sans-serif;
}

body{
background:linear-gradient(135deg,#ffb6d9,#ffd6ec,#ffeaf5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:40px;
border-radius:28px;
box-shadow:0 15px 40px rgba(255,120,170,0.25);
text-align:center;
width:420px;
}

h1{
color:#ff2d95;
margin-bottom:20px;
}

.stage{
font-size:14px;
color:#888;
margin-bottom:10px;
}

.name{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
color:#ff2d95;
}

.timer{
font-size:40px;
font-weight:bold;
margin-bottom:15px;
}

img{
width:220px;
border-radius:15px;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:10px;
justify-content:center;
}

button{
padding:10px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff5cb8,#ff2d95);
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>🧘 스트레칭</h1>

<div class="stage" id="stage"></div>

<div class="name" id="name"></div>

<img id="gif">

<div class="timer" id="timer"></div>

<div class="buttons">
<button onclick="start()">시작</button>
<button onclick="pause()">정지</button>
<button onclick="reset()">리셋</button>
</div>

</div>

<script>

const stretches=[

{
name:"목 스트레칭",
gif:"https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif",
time:15
},

{
name:"어깨 돌리기",
gif:"https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
time:15
},

{
name:"허리 스트레칭",
gif:"https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
time:15
},

{
name:"손목 스트레칭",
gif:"https://media.giphy.com/media/xT9IgG50Fb7Mi0prBC/giphy.gif",
time:15
},

{
name:"기지개 켜기",
gif:"https://media.giphy.com/media/l3vR85PnGsBwu1PFK/giphy.gif",
time:15
}

]

let index=0
let time=0
let interval

function load(){

const s=stretches[index]

document.getElementById("stage").innerText=`${index+1} / ${stretches.length}`

document.getElementById("name").innerText=s.name

document.getElementById("gif").src=s.gif

time=s.time

update()

}

function update(){

document.getElementById("timer").innerText=time+"s"

}

function start(){

clearInterval(interval)

interval=setInterval(()=>{

time--

update()

if(time<=0){

index++

if(index>=stretches.length){

alert("스트레칭 완료!")

clearInterval(interval)

return

}

load()

}

},1000)

}

function pause(){

clearInterval(interval)

}

function reset(){

clearInterval(interval)

index=0

load()

}

load()

</script>

</body>
</html>
