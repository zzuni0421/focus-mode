<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stretch Break</title>

<style>

body{
margin:0;
font-family:Pretendard,sans-serif;
background:linear-gradient(135deg,#ffb6d9,#ffd6ec,#ffeaf5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
padding:40px;
border-radius:28px;
box-shadow:0 15px 40px rgba(255,120,170,0.25);
text-align:center;
width:420px;
}

h1{
color:#ff2d95;
margin-bottom:20px;
}

.stage{
color:#888;
margin-bottom:10px;
}

.name{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
color:#ff2d95;
}

.icon{
font-size:80px;
margin-bottom:20px;
animation:move 2s infinite ease-in-out;
}

.timer{
font-size:42px;
font-weight:bold;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:10px;
justify-content:center;
}

button{
padding:10px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff5cb8,#ff2d95);
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

@keyframes move{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<h1>🧘 스트레칭</h1>

<div class="stage" id="stage"></div>

<div class="name" id="name"></div>

<div class="icon" id="icon"></div>

<div class="timer" id="timer"></div>

<div class="buttons">
<button onclick="start()">시작</button>
<button onclick="pause()">정지</button>
<button onclick="reset()">리셋</button>
</div>

</div>

<script>

const stretches=[
{name:"목 스트레칭",icon:"🙆‍♂️",time:10},
{name:"어깨 돌리기",icon:"💪",time:10},
{name:"허리 스트레칭",icon:"🧍",time:10},
{name:"손목 스트레칭",icon:"✋",time:10},
{name:"기지개 켜기",icon:"🙌",time:10}
]

let index=0
let time=0
let interval

function load(){

const s=stretches[index]

document.getElementById("stage").innerText=`${index+1} / ${stretches.length}`

document.getElementById("name").innerText=s.name

document.getElementById("icon").innerText=s.icon

time=s.time

update()

}

function update(){

document.getElementById("timer").innerText=time+"s"

}

function start(){

clearInterval(interval)

interval=setInterval(()=>{

time--

update()

if(time<=0){

index++

if(index>=stretches.length){

alert("스트레칭 완료!")

clearInterval(interval)

return

}

load()

}

},1000)

}

function pause(){

clearInterval(interval)

}

function reset(){

clearInterval(interval)
index=0
load()

}

load()

</script>

</body>
</html>
