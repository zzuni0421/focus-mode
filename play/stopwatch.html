<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스톱워치</title>

<style>
body{
margin:0;
font-family:Pretendard,sans-serif;
background:linear-gradient(135deg,#ffb6d9,#ffd6ec,#ffeaf5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 메인 카드 */

.container{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:45px;
border-radius:28px;
box-shadow:0 15px 40px rgba(255,120,170,0.25);
text-align:center;
width:380px;
border:1px solid rgba(255,255,255,0.5);
}

/* 시간 */

.time{
font-size:64px;
font-weight:700;
margin-bottom:25px;
letter-spacing:2px;
color:#ff2d95;
}

/* 버튼 영역 */

.buttons{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:22px;
}

/* 버튼 */

button{
padding:10px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff5cb8,#ff2d95);
color:white;
cursor:pointer;
font-size:14px;
font-weight:600;
transition:0.2s;
box-shadow:0 6px 15px rgba(255,80,150,0.3);
}

button:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 10px 20px rgba(255,80,150,0.4);
}

button:active{
transform:scale(0.95);
}

/* 랩 기록 */

.laps{
max-height:200px;
overflow:auto;
text-align:left;
font-size:14px;
border-top:1px solid rgba(255,180,210,0.4);
padding-top:12px;
}

/* 개별 랩 */

.lap{
padding:6px 0;
border-bottom:1px solid rgba(255,200,220,0.4);
color:#555;
}

/* 스크롤바 */

.laps::-webkit-scrollbar{
width:6px;
}

.laps::-webkit-scrollbar-thumb{
background:#ffc1e3;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>⏱ 스톱워치</h2>

<div class="time" id="time">00:00:00.000</div>

<div class="buttons">
<button onclick="toggle()">시작 / 정지</button>
<button onclick="lap()">랩</button>
<button onclick="reset()">리셋</button>
</div>

<div class="laps" id="laps"></div>

</div>

<script>

let startTime=0;
let elapsed=0;
let timer=null;

const display=document.getElementById("time");

function format(ms){

let h=Math.floor(ms/3600000);
let m=Math.floor((ms%3600000)/60000);
let s=Math.floor((ms%60000)/1000);
let msr=ms%1000;

return String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")+"."+
String(msr).padStart(3,"0");

}

function update(){

elapsed=Date.now()-startTime;

display.innerText=format(elapsed);

localStorage.setItem("stopwatch-time",elapsed);

}

function toggle(){

if(timer){

clearInterval(timer);
timer=null;
return;

}

startTime=Date.now()-elapsed;

timer=setInterval(update,10);

}

function reset(){

clearInterval(timer);
timer=null;
elapsed=0;
display.innerText="00:00:00.000";
document.getElementById("laps").innerHTML="";
localStorage.removeItem("stopwatch-time");

}

function lap(){

const div=document.createElement("div");
div.className="lap";
div.innerText=format(elapsed);
document.getElementById("laps").prepend(div);

}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
e.preventDefault();
toggle();
}

if(e.key==="l") lap();

if(e.key==="r") reset();

});

const saved=localStorage.getItem("stopwatch-time");

if(saved){
elapsed=parseInt(saved);
display.innerText=format(elapsed);
}

</script>

</body>
</html>
