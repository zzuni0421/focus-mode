<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일기</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Pretendard",sans-serif;
}

body{
background:linear-gradient(135deg,#ffb6d9,#ffd1ec,#ffe9f6);
min-height:100vh;
padding:40px;
display:flex;
justify-content:center;
}

.container{
width:900px;
}

header{
margin-bottom:30px;
}

header h1{
font-size:38px;
color:#ff2d95;
}

.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(255,120,170,0.3);
}

.section-title{
font-size:20px;
margin-bottom:15px;
color:#ff2d95;
}

.row{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
background:#fff;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:150px;
padding:15px;
border-radius:12px;
border:none;
resize:none;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
background:linear-gradient(135deg,#ff5cb8,#ff2d95);
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.05);
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.preview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.entries{
display:flex;
flex-direction:column;
gap:15px;
}

.entry{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.entry-date{
font-weight:bold;
margin-bottom:5px;
color:#ff2d95;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1> MY DIARY </h1>
</header>

<div class="card">

<div class="section-title">✏️ 오늘 기록</div>

<div class="row">
<input type="date" id="date">
<select id="weather">
<option>☀️</option>
<option>🌧</option>
<option>⛅</option>
<option>❄️</option>
</select>

<select id="mood">
<option>😀</option>
<option>😊</option>
<option>😐</option>
<option>😢</option>
<option>😡</option>
</select>
</div>

<textarea id="content" placeholder="오늘 있었던 일을 기록하세요"></textarea>

<input type="file" id="photos" multiple>

<div class="preview" id="preview"></div>

<button onclick="saveDiary()">저장</button>

</div>


<div class="card">

<div class="section-title">📚 이전 일기</div>

<div id="entries" class="entries"></div>

</div>

</div>

<script>

let photosData=[]

document.getElementById("date").value=new Date().toISOString().slice(0,10)

document.getElementById("photos").addEventListener("change",function(){

const preview=document.getElementById("preview")
preview.innerHTML=""

photosData=[]

Array.from(this.files).forEach(file=>{

const reader=new FileReader()

reader.onload=function(e){

photosData.push(e.target.result)

const img=document.createElement("img")
img.src=e.target.result
preview.appendChild(img)

}

reader.readAsDataURL(file)

})

})


function saveDiary(){

const date=document.getElementById("date").value
const weather=document.getElementById("weather").value
const mood=document.getElementById("mood").value
const content=document.getElementById("content").value

const entry={
date,
weather,
mood,
content,
photos:photosData
}

let diaries=JSON.parse(localStorage.getItem("diaries")||"[]")

diaries.push(entry)

localStorage.setItem("diaries",JSON.stringify(diaries))

loadEntries()

alert("저장 완료!")

}


function loadEntries(){

const container=document.getElementById("entries")
container.innerHTML=""

const diaries=JSON.parse(localStorage.getItem("diaries")||"[]").reverse()

diaries.forEach(d=>{

const div=document.createElement("div")
div.className="entry"

let photosHTML=""

d.photos.forEach(p=>{
photosHTML+=`<img src="${p}" style="width:60px;border-radius:8px;margin-right:5px">`
})

div.innerHTML=`

<div class="entry-date">${d.date} ${d.weather} ${d.mood}</div>

<div>${d.content}</div>

<div>${photosHTML}</div>

`

container.appendChild(div)

})

}

loadEntries()

</script>

</body>
</html>
