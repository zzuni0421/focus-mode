<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Mode</title>

<style>
body{
    margin:0;
    font-family:"Pretendard",sans-serif;
    background:linear-gradient(135deg,#ff9ecf,#ffc3e6,#ffe3f3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 메인 카드 */

.container{
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(12px);
    padding:45px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(255,120,180,0.25);
    text-align:center;
    width:360px;
    border:1px solid rgba(255,255,255,0.4);
}

/* 제목 */

h1{
    margin-bottom:30px;
    font-size:32px;
    color:#ff4fa3;
    letter-spacing:1px;
}

/* 메뉴 */

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

/* 버튼 */

button{
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    background:linear-gradient(135deg,#ff6fb1,#ff3d97);
    color:white;
    font-weight:600;
    transition:all 0.25s ease;
    box-shadow:0 6px 15px rgba(255,80,150,0.3);
}

/* 버튼 hover */

button:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 10px 20px rgba(255,80,150,0.45);
    background:linear-gradient(135deg,#ff4fa3,#ff2b8c);
}

/* 버튼 클릭 */

button:active{
    transform:scale(0.95);
}

/* 푸터 */

.footer{
    margin-top:28px;
    font-size:13px;
    color:#b05a87;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Focus Mode</h1>

<div class="menu">
<button onclick="goDiary()">📓 일기</button>
<button onclick="goTimer()">⏱ 타이머</button>
<button onclick="goStopwatch()">⏲ 스톱워치</button>
</div>

<div class="footer">
2026 Focus Mode
</div>

</div>

<script src="js/index.js"></script>
</body>
</html>
